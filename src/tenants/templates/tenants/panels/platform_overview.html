<section class="panel" id="platform-overview-panel">
    <h2 class="panel__heading">
        <svg class="icon icon-site" aria-hidden="true"><use href="#icon-site"></use></svg>
        Platform Overview
    </h2>
    <div class="panel__body">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value">{{ total_tenants }}</div>
                <div class="stat-label">Total Tenants</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">{{ active_tenants }}</div>
                <div class="stat-label">Active Tenants</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">{{ total_users }}</div>
                <div class="stat-label">Platform Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">{{ active_memberships }}</div>
                <div class="stat-label">Active Memberships</div>
            </div>
        </div>
    </div>
</section>
