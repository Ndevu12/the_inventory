<section class="panel" id="stock-summary-panel">
    <h2 class="panel__heading">
        <svg class="icon icon-doc-empty" aria-hidden="true"><use href="#icon-doc-empty"></use></svg>
        Stock Summary
    </h2>
    <div class="panel__body">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value">{{ total_products }}</div>
                <div class="stat-label">Active Products</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">{{ total_locations }}</div>
                <div class="stat-label">Stock Locations</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">{{ total_items }}</div>
                <div class="stat-label">Total Items</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">{{ total_reserved }}</div>
                <div class="stat-label">Reserved</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">{{ total_available }}</div>
                <div class="stat-label">Available</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">${{ total_value|floatformat:0 }}</div>
                <div class="stat-label">Stock Value</div>
            </div>
        </div>
    </div>
</section>
