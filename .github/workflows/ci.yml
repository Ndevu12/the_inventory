name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: ruff check src tests seeders

  django-checks:
    name: Django System Checks
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: the_inventory.settings.dev
      PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django checks
        working-directory: src
        run: python manage.py check

      - name: Check for missing migrations
        working-directory: src
        run: python manage.py makemigrations --check --dry-run

  test-functionality:
    name: Tests - Functionality (Python 3.12)
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: the_inventory.settings.dev
      PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run functionality tests
        run: python src/manage.py test --exclude-tag=seeder

  test-seeders:
    name: Tests - Seeders (Python 3.12)
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: the_inventory.settings.dev
      PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run seeder tests
        working-directory: src
        run: python manage.py test tests.seeders

